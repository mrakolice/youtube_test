services:
  postgres:
    image: postgres:15-alpine
    container_name: youtube_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-youtube_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-youtube_password}
      POSTGRES_DB: ${POSTGRES_DB:-youtube_db}
    ports:
      - "${POSTGRES_EXTERNAL_PORT:-5434}:${POSTGRES_PORT:-5432}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-youtube_user}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: youtube_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_password}
    ports:
      - "${REDIS_EXTERNAL_PORT:-6380}:${REDIS_EXTERNAL_PORT:-6380}"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: youtube_kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: ${ZOOKEEPER_HOST:-zookeeper}:${ZOOKEEPER_PORT:-2181}
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://${KAFKA_HOST:-kafka}:${KAFKA_PORT:-9092},PLAINTEXT_HOST://${KAFKA_ADVERTISED_HOST:-localhost}:${KAFKA_EXTERNAL_PORT:-29092}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "${KAFKA_EXTERNAL_PORT:-29092}:${KAFKA_EXTERNAL_PORT:-29092}"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9092"]
      interval: 10s
      timeout: 5s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: youtube_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: ${ZOOKEEPER_PORT:-2181}

  auth-service:
    build:
      context: ./backend/services/auth
      dockerfile: Dockerfile
      # Matches the container's user to the host user that owns the bind
      # mount below, so files created inside the container (.venv, egg-info,
      # __pycache__, ...) aren't owned by root on the host. Override if your
      # host UID/GID differ, e.g.: HOST_UID=$(id -u) HOST_GID=$(id -g) docker compose build
      args:
        UID: ${HOST_UID:-1000}
        GID: ${HOST_GID:-1000}
    container_name: youtube_auth_service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-youtube_user}:${POSTGRES_PASSWORD:-youtube_password}@${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-youtube_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password}@${REDIS_HOST:-redis}:${REDIS_PORT:-6379}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
    ports:
      - "${AUTH_SERVICE_PORT:-8001}:8000"
    volumes:
      - ./backend/services/auth:/app
      # Keep the image's own dependency install isolated from the bind mount
      # above (same trick as frontend's node_modules below).
      - /app/.venv
      - /app/youtube_auth_service.egg-info
      - ./backend/services/auth/logs:/app/logs

  video-service:
    build:
      context: ./backend/services/videos
      dockerfile: Dockerfile
      args:
        UID: ${HOST_UID:-1000}
        GID: ${HOST_GID:-1000}
    container_name: youtube_video_service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-youtube_user}:${POSTGRES_PASSWORD:-youtube_password}@${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-youtube_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password}@${REDIS_HOST:-redis}:${REDIS_PORT:-6379}
      KAFKA_BROKER: ${KAFKA_BROKER:-kafka:9092}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
    ports:
      - "${VIDEO_SERVICE_PORT:-8002}:8000"
    volumes:
      - ./backend/services/videos:/app
      - video_uploads:/app/uploads
      - /app/.venv
      - /app/youtube_video_service.egg-info
      - ./backend/services/videos/logs:/app/logs

  view-service:
    build:
      context: ./backend/services/views
      dockerfile: Dockerfile
      args:
        UID: ${HOST_UID:-1000}
        GID: ${HOST_GID:-1000}
    container_name: youtube_view_service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-youtube_user}:${POSTGRES_PASSWORD:-youtube_password}@${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-youtube_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password}@${REDIS_HOST:-redis}:${REDIS_PORT:-6379}
      KAFKA_BROKER: ${KAFKA_BROKER:-kafka:9092}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
    ports:
      - "${VIEW_SERVICE_PORT:-8003}:8000"
    volumes:
      - ./backend/services/views:/app
      - /app/.venv
      - /app/youtube_view_service.egg-info
      - ./backend/services/views/logs:/app/logs

  like-service:
    build:
      context: ./backend/services/likes
      dockerfile: Dockerfile
      args:
        UID: ${HOST_UID:-1000}
        GID: ${HOST_GID:-1000}
    container_name: youtube_like_service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-youtube_user}:${POSTGRES_PASSWORD:-youtube_password}@${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-youtube_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password}@${REDIS_HOST:-redis}:${REDIS_PORT:-6379}
      KAFKA_BROKER: ${KAFKA_BROKER:-kafka:9092}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
    ports:
      - "${LIKE_SERVICE_PORT:-8004}:8000"
    volumes:
      - ./backend/services/likes:/app
      - /app/.venv
      - /app/youtube_like_service.egg-info
      - ./backend/services/likes/logs:/app/logs

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: youtube_frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
  redis_data:
  video_uploads:

networks:
  default:
    name: youtube_network
